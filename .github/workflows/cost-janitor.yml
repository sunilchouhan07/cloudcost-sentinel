name: CloudCost Janitor CI

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  cost-janitor:

    runs-on: ubuntu-latest

    services:

      localstack:
        image: localstack/localstack:3.5

        ports:
          - 4566:4566

        env:
          SERVICES: ec2,s3

    steps:

    # =====================================================
    # CHECKOUT
    # =====================================================

    - name: Checkout Repository
      uses: actions/checkout@v4

    # =====================================================
    # PYTHON
    # =====================================================

    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.11"

    # =====================================================
    # TERRAFORM
    # =====================================================

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

      with:
        terraform_version: 1.8.5

    # =====================================================
    # INSTALL TFLOCAL
    # =====================================================

    - name: Install Terraform Local
      run: |
        pip install terraform-local

    # =====================================================
    # TERRAFORM INIT
    # =====================================================

    - name: Terraform Init
      working-directory: terraform

      run: |
        tflocal init

    # =====================================================
    # TERRAFORM FORMAT CHECK
    # =====================================================

    - name: Terraform Format Check
      working-directory: terraform

      run: |
        terraform fmt -check

    # =====================================================
    # TERRAFORM VALIDATE
    # =====================================================

    - name: Terraform Validate
      working-directory: terraform

      run: |
        tflocal validate

    # =====================================================
    # TERRAFORM APPLY
    # =====================================================

    - name: Terraform Apply
      working-directory: terraform

      run: |
        tflocal apply -auto-approve

    # =====================================================
    # INSTALL PYTHON DEPENDENCIES
    # =====================================================

    - name: Install Python Dependencies
      working-directory: janitor

      run: |
        pip install -r requirements.txt

    # =====================================================
    # RUN JANITOR
    # =====================================================

    - name: Run CloudCost Janitor
      id: janitor
      working-directory: janitor

      run: |
        python janitor.py --dry-run

      continue-on-error: true

    # =====================================================
    # UPLOAD JSON REPORT
    # =====================================================

    - name: Upload JSON Report
      if: always()

      uses: actions/upload-artifact@v4

      with:
        name: report-json
        path: janitor/report.json

    # =====================================================
    # UPLOAD MARKDOWN REPORT
    # =====================================================

    - name: Upload Markdown Report
      if: always()

      uses: actions/upload-artifact@v4

      with:
        name: report-markdown
        path: janitor/report.md

    # =====================================================
    # PRINT REPORT
    # =====================================================

    - name: Print Markdown Report
      if: always()

      run: |
        cat janitor/report.md

    # =====================================================
    # COMMENT ON PR
    # =====================================================

    - name: Comment PR With Findings

      if: github.event_name == 'pull_request'

      uses: actions/github-script@v7

      with:
        script: |

          const fs = require('fs');

          const report = fs.readFileSync(
            'janitor/report.md',
            'utf8'
          );

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });

    # =====================================================
    # FAIL IF ORPHANS FOUND
    # =====================================================

    - name: Fail If Orphans Found

      if: steps.janitor.outcome == 'failure'

      run: |
        echo "Orphan resources detected"
        exit 1